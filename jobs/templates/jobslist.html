
{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}


<section class="serach">
    <div class="w-full flex justify-evenly">
    <form action="/company:all/?s=1" method="post">
    {% csrf_token %}
    <input name="requestjob" 
    type="search" 
    class="h-[40px] w-[300px] p-2 rounded-xl border-2 outline-none" 
    placeholder="Search Job">
    <button class="bg-blue-600 hover:bg-blue-500 text-white rounded-xl h-[40px] w-[40px]">
        <i class="fa-solid fa-magnifying-glass"></i>
    </button>
</form>

</section>

<section class="list flex gap-[16px] p-[16px] flex-wrap ">
    {% for job in jobslist %}
        <div class="jobitem w-[300px] h-[300px] bg-white border-2 rounded-xl flex flex-col items-center justify-around px-4">
            <h2 class="capitalize text-xl font-bold">{{job.jobtitle}}</h2>
            <h3 class="uppercase">{{job.company_name}}</h3>
            
        </div>
    {% endfor %}
</section>


{% endblock %}
